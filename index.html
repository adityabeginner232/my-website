<!DOCTYPE html>
<html>
<head>
<title>Dino Game</title>
<style>
body{
margin:0;
overflow:hidden;
background:#f7f7f7;
font-family:Arial;
text-align:center;
}

#game{
width:100%;
height:200px;
border-bottom:3px solid black;
position:relative;
margin-top:100px;
}

#dino{
width:40px;
height:40px;
background:green;
position:absolute;
bottom:0;
left:50px;
}

#cactus{
width:20px;
height:40px;
background:red;
position:absolute;
bottom:0;
right:-20px;
animation:block 2s infinite linear;
}

@keyframes block{
0%{right:-20px;}
100%{right:100%;}
}

.jump{
animation:jump 0.5s;
}

@keyframes jump{
0%{bottom:0;}
50%{bottom:80px;}
100%{bottom:0;}
}

</style>
</head>

<body>

<h1>Dinosaur Game 🦖</h1>
<p>Press SPACE to Jump</p>

<div id="game">
<div id="dino"></div>
<div id="cactus"></div>
</div>

<script>

let dino=document.getElementById("dino");
let cactus=document.getElementById("cactus");

document.addEventListener("keydown",function(e){
if(e.code=="Space"){
jump();
}
});

function jump(){
if(!dino.classList.contains("jump")){
dino.classList.add("jump");

setTimeout(function(){
dino.classList.remove("jump");
},500);
}
}

let check=setInterval(function(){

let dinoTop=parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
let cactusLeft=parseInt(window.getComputedStyle(cactus).getPropertyValue("right"));

if(cactusLeft>window.innerWidth-100 && cactusLeft<window.innerWidth-60 && dinoTop<40){
alert("Game Over!");
location.reload();
}

},10);

</script>

</body>
</html>
