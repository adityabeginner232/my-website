<!DOCTYPE html>
<html>
<head>
<title>Mini Game Hub</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
cursor:pointer;
}

canvas{
background:white;
margin-top:20px;
}

#memory{
display:none;
margin-top:20px;
}

.card{
width:80px;
height:80px;
background:gray;
display:inline-block;
margin:5px;
font-size:40px;
line-height:80px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🎮 Mini Game Hub</h1>

<button onclick="startDino()">Dino Game</button>
<button onclick="startPong()">Pong</button>
<button onclick="startMemory()">Memory Game</button>

<canvas id="gameCanvas" width="600" height="200"></canvas>

<div id="memory"></div>

<script>

let canvas=document.getElementById("gameCanvas");
let ctx=canvas.getContext("2d");

function clearGames(){
ctx.clearRect(0,0,canvas.width,canvas.height);
document.getElementById("memory").style.display="none";
}









// DINO GAME

function startDino(){

clearGames()

let dinoY=150
let cactusX=600

document.onkeydown=function(e){
if(e.code=="Space") dinoY=100
}

function loop(){

ctx.clearRect(0,0,600,200)

ctx.fillStyle="green"
ctx.fillRect(50,dinoY,30,30)

ctx.fillStyle="red"
ctx.fillRect(cactusX,150,20,40)

cactusX-=5

if(cactusX<0) cactusX=600

if(cactusX<80 && cactusX>50 && dinoY>120){
alert("Game Over")
location.reload()
}

if(dinoY<150)dinoY+=3

requestAnimationFrame(loop)
}

loop()

}









// PONG GAME

function startPong(){

clearGames()

let paddle=250
let ballX=300
let ballY=100
let vx=4
let vy=4

document.onmousemove=function(e){
paddle=e.clientX-100
}

function loop(){

ctx.clearRect(0,0,600,200)

ctx.fillRect(paddle,180,100,10)

ctx.beginPath()
ctx.arc(ballX,ballY,10,0,Math.PI*2)
ctx.fill()

ballX+=vx
ballY+=vy

if(ballX<0 || ballX>600) vx=-vx
if(ballY<0) vy=-vy

if(ballY>170 && ballX>paddle && ballX<paddle+100){
vy=-vy
}

if(ballY>200){
alert("Game Over")
location.reload()
}

requestAnimationFrame(loop)
}

loop()

}









// MEMORY GAME

function startMemory(){

clearGames()

let container=document.getElementById("memory")
container.style.display="block"
container.innerHTML=""

let emojis=["🍎","🍎","🐶","🐶","🚗","🚗","⚽","⚽"]

emojis.sort(()=>Math.random()-0.5)

let first=null

emojis.forEach(e=>{

let card=document.createElement("div")
card.className="card"
card.innerHTML="?"

card.onclick=function(){

if(card.innerHTML=="?"){
card.innerHTML=e

if(!first){
first=card
}
else{
if(first.innerHTML!=card.innerHTML){
setTimeout(()=>{
card.innerHTML="?"
first.innerHTML="?"
first=null
},500)
}else{
first=null
}
}
}

}

container.appendChild(card)

})

}

</script>

</body>
</html>
